# ==========================================
# SERVER
# ==========================================
server.port=8080
server.address=0.0.0.0
logging.level.org.springframework.security=DEBUG

# ==========================================
# DATABASE
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/ressource_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ==========================================
# JWT
# ==========================================
jwt.secret=university_portal_secret_key_must_be_at_least_256_bits_long_for_hs256
jwt.expiration.access=900000
jwt.expiration.refresh=604800000